name: Run parser

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

jobs:
  parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          SITE_IMPORT_URL: ${{ secrets.SITE_IMPORT_URL }}
          SITE_KEY: ${{ secrets.SITE_KEY }}
          TG_CHANNELS: ${{ secrets.TG_CHANNELS }}
        run: python parser_posts_tg.py
